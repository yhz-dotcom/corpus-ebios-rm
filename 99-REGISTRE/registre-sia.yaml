# 📋 Template : registre-sia.yaml — Registre des Systèmes d'IA

---

## 📝 Fichier YAML Complet

```yaml
# =============================================================================
# REGISTRE DES SYSTÈMES D'IA — EBIOS-RM "Usage-First"
# =============================================================================
# Objectif : Tracker tous les usages IA qualifiés dans l'organisation
# Alignement : AI Act Art. 12 + EBIOS-RM + ISO 42001
# Format : YAML (versionnable dans Git, lisible par humain et machine)
# =============================================================================

metadata:
  version: "1.0"
  dernier_update: "YYYY-MM-DD"
  responsable_registre: "[Nom/Fonction]"
  frequence_revue: "Trimestrielle"
  outil_qualification: "00-USAGE-QUALIFIER.md"
  nb_entrees_actives: 0
  nb_entrees_archivees: 0

# =============================================================================
# ENTRÉES DU REGISTRE (une par usage qualifié)
# =============================================================================

sia_entries:

  # ---------------------------------------------------------------------------
  # EXEMPLE 1 : Usage Conversationnel 🟢
  # ---------------------------------------------------------------------------
  - sia_id: "SIA-COM-001"
    
    identification:
      nom_usage: "Assistant de rédaction emails"
      description: "Génération de brouillons d'emails clients via prompts"
      equipe_responsable: "Support Client"
      date_qualification: "2026-03-06"
      qualifié_par: "Marie Dupont"
    
    technique:
      modele_base: "Qwen3.5"
      provider_modele: "Alibaba Cloud (API)"
      interface: "Chat interne + prompts templates"
      modification_modele: false
      variante_technique: null
      version_modele: "2025-12-01"
    
    usage:
      niveau_automatisation: "Conversationnel"
      impact_sortie: "Informel"
      donnees_manipulees: ["Internes non sensibles"]
      supervision_humaine: "Systématique (humain envoie)"
      domaine_metier: "Relation client"
    
    qualification:
      niveau_ebios: "🟢 Light"
      template_utilise: "fiche-light.md"
      fiche_reference: "11-SIA/20-OUTILS/archives/fiche-light-SIA-COM-001.md"
      date_prochaine_qualification: "2027-03-06"
    
    ai_act:
      annex_iii: false
      role: "Deployer"
      obligations_specifiques: []
      date_derniere_verification_conformite: "2026-03-06"
    
    rgpd:
      concerne: false
      aipd_reference: null
      categorie_donnees: []
      base_legale: null
    
    gouvernance:
      responsable_metier: "Marie Dupont"
      responsable_technique: "IT Support"
      sponsor_direction: null
      date_deploiement: "2026-02-01"
      statut: "Actif"
      prochaine_revue: "2027-03-06"
    
    risques_synthese:
      risque_principal: "Hallucination dans un email client"
      niveau_risque: "Faible"
      mesure_cle: "Validation humaine obligatoire avant envoi"
      incidents_signales: 0
      dernier_incident: null
    
    declencheurs_reevaluation:
      - "Incident de fuite de données"
      - "Changement d'usage vers automatisation"
      - "Évolution réglementaire"
    
    tags: ["conversationnel", "support", "low-risk", "qwen3.5", "light"]

  # ---------------------------------------------------------------------------
  # EXEMPLE 2 : Usage Workflow 🟡
  # ---------------------------------------------------------------------------
  - sia_id: "SIA-RH-001"
    
    identification:
      nom_usage: "Pré-sélection assistée de CV"
      description: "Qwen3.5 analyse les CV et propose une liste courte + justifications"
      equipe_responsable: "Recrutement Tech"
      date_qualification: "2026-03-05"
      qualifié_par: "Jean Martin, DPO"
    
    technique:
      modele_base: "Qwen3.5"
      provider_modele: "Alibaba Cloud (API)"
      interface: "Interface web interne + RAG sur base de compétences"
      modification_modele: false
      variante_technique: null
      version_modele: "2025-12-01"
    
    usage:
      niveau_automatisation: "Semi-automatisé"
      impact_sortie: "Décisionnel (avec validation)"
      donnees_manipulees: ["Données personnelles (CV)", "Internes RH"]
      supervision_humaine: "Validation systématique par recruteur"
