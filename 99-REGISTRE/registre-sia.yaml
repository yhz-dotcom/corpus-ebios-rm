        - "Droit d'explication aux clients (Art. 13)"
        - "Traçabilité complète (Art. 12)"
        - "FRIA réalisé (Art. 27a)"
        - "Tests biais réguliers (Art. 10)"
      fria_reference: "FRIA-FIN-001-2026"
      date_derniere_verification_conformite: "2026-02-20"
    
    rgpd:
      concerne: true
      aipd_reference: "AIPD-FIN-2026-003"
