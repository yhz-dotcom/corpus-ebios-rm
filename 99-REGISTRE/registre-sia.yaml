## 📈 Exemples de Requêtes (YAML)

### Lister tous les usages 🔴 Renforcé

```bash
yq '.sia_entries[] | select(.qualification.niveau_ebios == "🔴 Renforcé") | .sia_id' registre-sia.yaml
```

### Compter incidents par domaine

```bash
yq '.sia_entries | group_by(.usage.domaine_metier) | map({domaine: .[0].usage.domaine_metier, incidents: map(.risques_synthese.incidents_signales) | add})' registre-sia.yaml
```

### Extraire usages RGPD concernés

```bash
yq '.sia_entries[] | select(.rgpd.concerne == true) | [.sia_id, .identification.nom_usage, .rgpd.aipd_reference]' registre-sia.yaml
```

