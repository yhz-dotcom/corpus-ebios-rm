## 📊 Structure du Registre

```
registre-sia.yaml
│
├── metadata                    # Infos gestion registre
├── sia_entries[]              # Liste usages actifs
│   ├── sia_id                 # Identifiant unique
│   ├── identification         # Nom, description, équipe
│   ├── technique              # Modèle, provider, version
│   ├── usage                  # Automatisation, impact, données
│   ├── qualification          # Niveau EBIOS, template, référence
│   ├── ai_act                 # Conformité AI Act
│   ├── rgpd                   # Conformité RGPD
│   ├── gouvernance            # Responsables, statut, revues
│   ├── risques_synthese       # Risque principal, mesures
│   ├── declencheurs_reevaluation
│   └── tags[]                 # Mots-clés
├── sia_archives[]             # Usages désactivés
├── statistiques               # KPIs et métriques
└── changelog                  # Historique modifications
```

