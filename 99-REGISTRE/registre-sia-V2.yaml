# UTILITAIRES : Vues filtrées (pour requêtes YAML / scripts)
# =============================================================================

views:
  par_niveau:
    light: "${sia_entries[?niveau_ebios == '🟢 Light']}"
    standard: "${sia_entries[?niveau_ebios == '🟡 Standard']}"
    renforce: "${sia_entries[?niveau_ebios == '🔴 Renforcé']}"
    non_qualifie: "${sia_entries[?niveau_ebios == '⚪️ Non qualifié']}"
  
  par_conformite:
    annex_iii: "${sia_entries[?ai_act.annex_iii == true]}"
    rgpd_concerne: "${sia_entries[?rgpd.concerne == true]}"
    provider_role: "${sia_entries[?ai_act.role == 'Provider' || ai_act.role == 'Provider (for own use)']}"
  
  par_statut:
    actif: "${sia_entries[?statut == 'Actif']}"
    en_test: "${sia_entries[?statut == 'En test pilote']}"
    en_developpement: "${sia_entries[?statut == 'En développement']}"
    poc: "${sia_entries[?statut == 'POC / Expérimentation']}"
    archive: "${sia_entries[?statut == 'Archivé']}"

# =============================================================================
# INSTRUCTIONS D'USAGE
# =============================================================================

instructions:
  ajouter: |
    1. Copier un bloc exemple ci-dessus
    2. Remplir au minimum : sia_id, identification, qualification.niveau_ebios
    3. Lier la fiche EBIOS-RM correspondante dans fiche_reference
  
  mettre_a_jour: |
    1. Changer statut / prochaine_revue à chaque revue
    2. Incrémenter la version des fiches liées si modification
    3. Archiver les entrées obsolètes (statut: "Archivé")
  
  requeter: |
    # Utiliser yq / jq pour filtrer :
    yq '.sia_entries[] | select(.ai_act.annex_iii == true)' registre-sia-V2.yaml
    
    # Ou avec les vues prédéfinies :
    yq '.views.par_niveau.renforce' registre-sia-V2.yaml
  
  exporter: |
    # Pour reporting : convertir en CSV/JSON via script Python
    # Pour audit : générer un PDF avec les entrées "Actif" + liens vers fiches
