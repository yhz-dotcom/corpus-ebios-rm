---

## 📊 Différences V1 vs V2

| Aspect | V1 | V2 (Cette version) |
|:-------|:---|:-------------------|
| **Exception Art. 6(3)** | Champ booléen simple | Justification détaillée |
| **Indicateurs** | Liste simple | Métriques avec seuils d'alerte |
| **Variantes techniques** | Nom seul | Fiche complète (LoRA, tests, réversibilité) |
| **Déclencheurs** | Liste texte | Priorisés (Critique/Haute/Moyenne) |
| **Risques** | Nom + mitigation | ID, niveau, responsable assigné |
| **Complexité** | Modérée | Élevée |
| **Temps remplissage** | ~10 min | ~20-30 min |

---

## 🎯 Recommandation d'Usage

| Type d'usage | Version recommandée | Justification |
|:-------------|:--------------------|:--------------|
| 🟢 Light | **V1** | Simplicité suffisante |
| 🟡 Standard simple | **V1** | Pas besoin de granularité |
| 🟡 Standard + Art. 6(3) | **V2** | Justification obligatoire |
| 🔴 Renforcé classique | **V1 ou V2** | Selon complexité |
| 🔴 Renforcé + fine-tuning | **V2** | Tests et réversibilité nécessaires |

